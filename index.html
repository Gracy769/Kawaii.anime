<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Anime | CORS-Bypass Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="bg-[#080808] text-zinc-100 font-sans">

    <nav class="p-4 border-b border-cyan-900/30 flex flex-col md:flex-row justify-between items-center bg-black/80 backdrop-blur-xl sticky top-0 z-50">
        <h1 class="text-2xl font-black text-cyan-500 tracking-widest">GHOST-ANIME</h1>
        <div class="flex w-full md:w-1/3 gap-2 mt-4 md:mt-0">
            <input id="animeSearch" type="text" placeholder="Search (e.g. Naruto)" class="bg-zinc-900 border border-zinc-700 px-4 py-2 rounded-lg w-full outline-none focus:border-cyan-500">
            <button onclick="startSearch()" class="bg-cyan-600 px-6 py-2 rounded-lg font-bold hover:bg-cyan-500 transition">SEARCH</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 mt-6">
        <div class="aspect-video bg-black rounded-2xl overflow-hidden border border-zinc-800 shadow-[0_0_50px_rgba(6,182,212,0.1)]">
            <video id="mainPlayer" class="w-full h-full" controls autoplay></video>
        </div>
        <div class="mt-8">
            <h2 id="titleDisplay" class="text-3xl font-black text-cyan-400 italic uppercase">System Offline</h2>
            <div id="epGrid" class="grid grid-cols-4 md:grid-cols-10 gap-2 mt-6"></div>
        </div>
    </main>

    <script>
        const video = document.getElementById('mainPlayer');
        const hls = new Hls();
        
        // SURGICAL MOVE: Adding the CORS Proxy you just unlocked
        const PROXY = "https://cors-anywhere.herokuapp.com/";
        const API_BASE = "https://consumet-api-production-e685.up.railway.app/anime/gogoanime";

        async function startSearch() {
            const query = document.getElementById('animeSearch').value;
            const status = document.getElementById('titleDisplay');
            status.innerText = "Scanning Mirrors...";

            try {
                // We wrap the URL in the PROXY to bypass CORS blocks
                const res = await fetch(`${PROXY}${API_BASE}/${query}`);
                const data = await res.json();
                
                if (data.results && data.results.length > 0) {
                    const anime = data.results[0];
                    status.innerText = `ID: ${anime.id}`;
                    fetchInfo(anime.id);
                }
            } catch (err) {
                status.innerText = "Proxy Error. Refresh the CORS-Anywhere page.";
            }
        }

        async function fetchInfo(id) {
            try {
                const res = await fetch(`${PROXY}${API_BASE}/info/${id}`);
                const data = await res.json();
                
                const grid = document.getElementById('epGrid');
                grid.innerHTML = "";

                data.episodes.forEach(ep => {
                    const btn = document.createElement('button');
                    btn.innerText = ep.number;
                    btn.className = "bg-zinc-800 hover:bg-cyan-600 p-2 rounded font-bold transition text-xs";
                    btn.onclick = () => playEp(ep.id);
                    grid.appendChild(btn);
                });

                // Play Ep 1 automatically
                playEp(data.episodes[0].id);
            } catch (err) { console.error(err); }
        }

        async function playEp(epId) {
            try {
                const res = await fetch(`${PROXY}${API_BASE}/watch/${epId}`);
                const data = await res.json();
                const source = data.sources.find(s => s.quality === 'default') || data.sources[0];

                if (Hls.isSupported()) {
                    hls.loadSource(source.url);
                    hls.attachMedia(video);
                }
            } catch (err) { alert("Source Blocked even with Proxy."); }
        }
    </script>
</body>
</html>
