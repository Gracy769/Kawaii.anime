<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Anime | Zero Backend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="bg-zinc-950 text-white font-sans">

    <nav class="p-6 border-b border-zinc-800 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-cyan-500">GHOST-ANIME</h1>
        <div class="space-x-4">
            <input id="animeInput" type="text" placeholder="Search (e.g. one-piece)" class="bg-zinc-900 border border-zinc-700 px-4 py-2 rounded-lg focus:outline-none focus:border-cyan-500">
            <button onclick="loadAnime()" class="bg-cyan-600 px-6 py-2 rounded-lg hover:bg-cyan-500 transition">Watch</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 p-4">
        <div class="relative pt-[56.25%] bg-black rounded-xl overflow-hidden border border-zinc-800 shadow-2xl">
            <video id="videoPlayer" class="absolute top-0 left-0 w-full h-full" controls autoplay></video>
        </div>
        <div class="mt-6">
            <h2 id="currentTitle" class="text-3xl font-bold italic">Ready for Mission...</h2>
            <p class="text-zinc-400 mt-2">Bypassing local backend requirements. Streaming directly from 2026 HLS mirrors.</p>
        </div>
    </main>

    <script>
        const video = document.getElementById('videoPlayer');
        const hls = new Hls();

        async function loadAnime() {
            const id = document.getElementById('animeInput').value || 'one-piece';
            const statusTitle = document.getElementById('currentTitle');
            
            statusTitle.innerText = `Fetching: ${id}...`;

            try {
                // Using a 2026 public CORS-friendly proxy API
                // This replaces your 'main.py'
                const response = await fetch(`https://api.amvstr.me/api/v2/stream/${id}-episode-1`);
                const result = await response.json();

                if (result.data && result.data.nspl.main) {
                    const streamUrl = result.data.nspl.main;
                    
                    if (Hls.isSupported()) {
                        hls.loadSource(streamUrl);
                        hls.attachMedia(video);
                        statusTitle.innerText = `Streaming: ${id.replace('-', ' ')}`;
                    } else {
                        video.src = streamUrl;
                    }
                } else {
                    alert("Stream not found. Check the ID format (e.g., naruto-shippuden).");
                }
            } catch (error) {
                console.error(error);
                alert("Network Blocked. If you are on VIT Wi-Fi, use a Hotspot or VPN.");
            }
        }
    </script>
</body>
</html>
